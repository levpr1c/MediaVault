{% extends "base.html" %}
{% block head_extra %}
<link rel="stylesheet" href="/static/css/content-search.css?v=2">
{% endblock %}
{% block title %}{{ _('contentSearch') }}{% endblock %}
{% block hdr_drawer %}
<div class="mv-drawer-body">
  <div class="mv-drawer-row" id="drawerSources"></div>
  <div class="mv-drawer-row" id="drawerPageSizeCs">
    <span class="mv-drawer-label" data-i18n="contentSearchPageSize">{{ _('contentSearchPageSize') }}</span>
    <button class="tool-btn cs-page-size-btn active" data-size="20">20</button>
    <button class="tool-btn cs-page-size-btn" data-size="30">30</button>
    <button class="tool-btn cs-page-size-btn" data-size="50">50</button>
  </div>
</div>
{% endblock %}
{% block content %}
<div id="contentView">
  <main class="admin-main">
    <div class="cs-search-box admin-card">
      <div class="cs-input-wrap">
        <input id="csInput" type="text" class="cs-input mobile-search-hide" placeholder="{{ _('contentSearchPlaceholder') }}" autocomplete="off">
        <div id="csAutocomplete" class="cs-autocomplete" style="display:none"></div>
      </div>
      <button id="csSearchBtn" class="btn btn-sm btn-primary cs-search-btn">{{ _('contentSearchBtn') }}</button>
    </div>

    <div class="cs-sources">
      <label class="cs-source" data-site="r34">
        <input type="checkbox" value="r34" checked>
        <span class="cs-source-mrk"></span>
        <span class="cs-source-lbl">Rule34</span>
      </label>
      <label class="cs-source" data-site="dan">
        <input type="checkbox" value="dan" checked>
        <span class="cs-source-mrk"></span>
        <span class="cs-source-lbl">Danbooru</span>
      </label>
      <label class="cs-source" data-site="nhentai">
        <input type="checkbox" value="nhentai">
        <span class="cs-source-mrk"></span>
        <span class="cs-source-lbl">NHentai</span>
      </label>
      <label class="cs-source" data-site="eh">
        <input type="checkbox" value="eh">
        <span class="cs-source-mrk"></span>
        <span class="cs-source-lbl">E-Hentai</span>
      </label>
      <label class="cs-ai-toggle" title="Exclude AI-generated content">
        <input type="checkbox" id="csAiFilter">
        <span class="cs-ai-toggle-track"></span>
        <span class="cs-ai-toggle-lbl" data-i18n="contentSearchAiFilter">{{ _('contentSearchAiFilter') }}</span>
      </label>
      <span class="cs-sources-sep"></span>
      <div class="cs-top-page-size">
        <button class="cs-page-size-btn active" data-size="20">20</button>
        <button class="cs-page-size-btn" data-size="30">30</button>
        <button class="cs-page-size-btn" data-size="50">50</button>
      </div>
    </div>

    <div id="csLoading" class="admin-loading" style="display:none">
      <span class="fetch-spinner"></span> <span data-i18n="loading">{{ _('loading') }}</span>
    </div>

    <div id="csPaginationTop" class="cs-pagination-bar" style="display:none">
      <button id="csPrevPageTop" class="tool-btn page-prev-next" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        <span data-i18n="prevPage">{{ _('prevPage') }}</span>
      </button>
      <span id="csPageNumbersTop" class="page-numbers"></span>
      <button id="csNextPageTop" class="tool-btn page-prev-next" disabled>
        <span data-i18n="nextPage">{{ _('nextPage') }}</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <div id="csGrid" class="shared-grid cs-grid"></div>

    <div id="csBottomBar" class="cs-bottom-bar" style="display:none">
      <div class="cs-page-size-selector">
        <span class="cs-page-size-label" data-i18n="contentSearchPageSize">{{ _('contentSearchPageSize') }}</span>
        <button class="cs-page-size-btn active" data-size="20">20</button>
        <button class="cs-page-size-btn" data-size="30">30</button>
        <button class="cs-page-size-btn" data-size="50">50</button>
      </div>
      <div id="csPagination" class="cs-pagination-bar">
        <button id="csPrevPage" class="tool-btn page-prev-next" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          <span data-i18n="prevPage">{{ _('prevPage') }}</span>
        </button>
        <span id="csPageNumbers" class="page-numbers"></span>
        <button id="csNextPage" class="tool-btn page-prev-next" disabled>
          <span data-i18n="nextPage">{{ _('nextPage') }}</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>
<script type="module" src="/static/content/content-search.js?v=2"></script>
{% endblock %}
