<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masonry Comparison — MediaVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0f0f13;color:#e0e0e0;padding:24px;min-height:100vh}
h1{font-size:20px;font-weight:600;margin-bottom:6px}
.sub{color:#888;font-size:13px;margin-bottom:20px}

/* ─── Toggles ─── */
.toggles{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.toggles button{padding:8px 18px;border-radius:8px;border:1px solid #333;background:#1a1a22;color:#aaa;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
.toggles button:hover{background:#22222e;color:#fff}
.toggles button.active{background:#6c5ce7;color:#fff;border-color:#6c5ce7}

/* ─── Stats ─── */
.stats{margin-bottom:16px;font-size:13px;color:#888}

/* ─── Shared grid container (all modes use same #grid) ─── */
#grid{position:relative;width:100%}

/* ─── Item = placeholder tile ─── */
.item{border-radius:8px;overflow:hidden;background:var(--bg);color:#fff;padding:14px;position:relative}
.item .h{font-size:11px;opacity:.6;margin-bottom:6px}
.item .idx{font-size:22px;font-weight:700;opacity:.7}

/* ─── Mode 1: CSS Columns (like MV Gallery masonry) ─── */
/* Uses column-width to create a true masonry flow.
   Items flow top-to-bottom, then left-to-right.
   Each item fills 100% of the column width.
   break-inside:avoid prevents items from splitting across columns.
   This is the same approach used in SharedGrid and MV Gallery. */
#grid.columns{column-width:200px;column-gap:12px}
#grid.columns .item{display:inline-block;width:100%;margin-bottom:12px;break-inside:avoid}

/* ─── Mode 3: CSS Grid reference ─── */
/* Standard CSS Grid with auto-fill rows.
   Each row height is determined by the tallest item.
   Items don't fill gaps above shorter items — this shows
   why masonry layouts are needed for uneven heights. */
#grid.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
#grid.grid .item{margin:0}

/* ─── Masonry.js mode — no CSS grid/columns; JS handles positioning ─── */
#grid.masonryjs .item{width:200px;margin-bottom:12px}

@media(max-width:640px){
  #grid.columns{column-width:150px}
  #grid.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  #grid.masonryjs .item{width:150px}
}
</style>
</head>
<body>

<h1>🧱 Masonry Layout Comparison</h1>
<div class="sub">
  CSS Columns · Masonry.js (Desandro) · CSS Grid — 20 tiles, random heights 150–400px
</div>

<div class="toggles">
  <button data-mode="columns" class="active" onclick="switchMode('columns')">① CSS Columns</button>
  <button data-mode="masonryjs" onclick="switchMode('masonryjs')">② Masonry.js</button>
  <button data-mode="grid" onclick="switchMode('grid')">③ CSS Grid (reference)</button>
</div>

<div id="stats" class="stats"></div>
<div id="grid"></div>

<!-- Masonry.js from CDN; imagesLoaded is needed for reliable layout after images load -->
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>

<script>
// ──────────────────────────────────────────────
// 20 placeholder items with random heights & colors
// ──────────────────────────────────────────────
var COLORS = [
  '#6c5ce7','#e17055','#00cec9','#fd79a8','#0984e3',
  '#fdcb6e','#e84393','#00b894','#6c5ce7','#fab1a0'
];
var items = [];
for (var i = 0; i < 20; i++) {
  items.push({
    idx: i + 1,
    // Random height between 150–400px, biased to be varied
    h: 150 + Math.floor(Math.random() * 250),
    bg: COLORS[i % COLORS.length]
  });
}

var masonryInstance = null;

// ──────────────────────────────────────────────
// Render items into #grid using the current mode
// ──────────────────────────────────────────────
function render(mode) {
  var grid = document.getElementById('grid');
  grid.className = mode;        // sets the layout class

  // Build item HTML
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    html += '<div class="item" style="--bg:' + it.bg + ';height:' + it.h + 'px">' +
      '<div class="idx">#' + it.idx + '</div>' +
      '<div class="h">' + it.h + 'px</div>' +
    '</div>';
  }
  grid.innerHTML = html;

  // Destroy previous Masonry instance if any
  if (masonryInstance) {
    masonryInstance.destroy();
    masonryInstance = null;
  }

  // ─── Mode 2: Masonry.js — initialise after DOM render ───
  // Masonry.js (Desandro) is a JS-powered masonry layout.
  // It absolutely-positions items using JS-calculated column positions.
  // Requires imagesLoaded to re-layout after images finish loading.
  // Pros: pixel-perfect, no uneven column bottoms.
  // Cons: JS dependency, layout flicker on load, reflow on resize.
  if (mode === 'masonryjs') {
    var msnry = new Masonry(grid, {
      columnWidth: 200,
      itemSelector: '.item',
      gutter: 12,
      fitWidth: false,
      transitionDuration: '0.2s'
    });
    masonryInstance = msnry;

    // Re-layout after images (none here, but kept as example)
    imagesLoaded(grid).on('progress', function() {
      msnry.layout();
    });
  }
}

// ──────────────────────────────────────────────
// Mode switching
// ──────────────────────────────────────────────
function switchMode(mode) {
  // Update toggle buttons
  document.querySelectorAll('.toggles button').forEach(function(b) {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  render(mode);
  document.getElementById('stats').textContent =
    'Mode: ' + mode + ' | Items: ' + items.length +
    ' | Heights: ' + items.map(function(i){return i.h}).join(', ');
}

// Initial render: CSS Columns
render('columns');
document.getElementById('stats').textContent =
  'Mode: columns | Items: ' + items.length +
  ' | Heights: ' + items.map(function(i){return i.h}).join(', ');
</script>

<!--
╔══════════════════════════════════════════════════════════════╗
║                      COMPARISON NOTES                        ║
╠══════════════════════════════════════════════════════════════╣
║                                                              ║
║  ① CSS Columns (current MV Gallery / SharedGrid masonry)     ║
║     ─────────────────────────────────────────────             ║
║     • Pure CSS — no JS after initial render                  ║
║     • Items flow top→bottom, then left→right                 ║
║     • Natural responsive: columns shrink/grow with viewport   ║
║     • Cannot control which column gets which item             ║
║     • Last column may be shorter (no balancing)               ║
║     • Best for: media galleries, varied aspect ratios         ║
║                                                              ║
║  ② Masonry.js (Desandro)                                     ║
║     ─────────────────────────────                             ║
║     • JS-powered: absolutely positions each element           ║
║     • Algorithm places item in shortest column                ║
║     • Requires imagesLoaded + resize handler                  ║
║     • Pixel-perfect column balance                            ║
║     • Layout flicker on initial load                          ║
║     • Best for: fixed-width cards, blog/masonry grids         ║
║                                                              ║
║  ③ CSS Grid (reference — not masonry)                        ║
║     ────────────────────────────────────────                  ║
║     • Standard grid with equal-height rows                    ║
║     • No gaps above shorter items — rows locked to tallest    ║
║     • Predictable, stable layout                              ║
║     • Wasted space with mixed heights                         ║
║     • Best for: uniform cards, dashboards                     ║
║                                                              ║
╚══════════════════════════════════════════════════════════════╝
-->
</body>
</html>
