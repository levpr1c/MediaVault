{% extends "base.html" %}
{% block head_extra %}
<link rel="stylesheet" href="/static/css/content-search.css?v=2">
{% endblock %}
{% block title %}{{ _('contentSearch') }}{% endblock %}
{% block hdr_drawer %}{% endblock %}
{% block content %}
<div id="contentView">
  <main class="admin-main">
    <h2 class="admin-page-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      {{ _('contentSearch') }}
    </h2>

    <div class="cs-search-box admin-card">
      <div class="cs-input-wrap">
        <input id="csInput" type="text" class="cs-input mobile-search-hide" placeholder="{{ _('contentSearchPlaceholder') }}" autocomplete="off">
        <div id="csAutocomplete" class="cs-autocomplete" style="display:none"></div>
      </div>
      <button id="csSearchBtn" class="btn btn-sm btn-primary cs-search-btn">{{ _('contentSearchBtn') }}</button>
    </div>

    <div class="cs-sources">
      <label class="cs-source" data-site="r34">
        <input type="checkbox" value="r34" checked>
        <span class="cs-source-mrk"></span>
        <span class="cs-source-lbl">Rule34</span>
      </label>
      <label class="cs-source" data-site="dan">
        <input type="checkbox" value="dan" checked>
        <span class="cs-source-mrk"></span>
        <span class="cs-source-lbl">Danbooru</span>
      </label>
      <label class="cs-source" data-site="nhentai">
        <input type="checkbox" value="nhentai">
        <span class="cs-source-mrk"></span>
        <span class="cs-source-lbl">NHentai</span>
      </label>
      <label class="cs-source" data-site="eh">
        <input type="checkbox" value="eh">
        <span class="cs-source-mrk"></span>
        <span class="cs-source-lbl">E-Hentai</span>
      </label>
      <label class="cs-ai-toggle" title="Exclude AI-generated content">
        <input type="checkbox" id="csAiFilter">
        <span class="cs-ai-toggle-track"></span>
        <span class="cs-ai-toggle-lbl" data-i18n="contentSearchAiFilter">{{ _('contentSearchAiFilter') }}</span>
      </label>
    </div>

    <div id="csPagination" class="cs-pagination" style="display:none">
      <button id="csPrevPage" class="btn btn-sm cs-page-btn" disabled>&lsaquo;</button>
      <span id="csPageInfo" class="cs-page-info">1/1</span>
      <button id="csNextPage" class="btn btn-sm cs-page-btn" disabled>&rsaquo;</button>
      <button id="csLoadMore" class="btn btn-sm cs-page-btn cs-load-more" data-i18n="contentSearchLoadMore">{{ _('contentSearchLoadMore') }}</button>
    </div>

    <div id="csLoading" class="admin-loading" style="display:none">
      <span class="fetch-spinner"></span> <span data-i18n="loading">{{ _('loading') }}</span>
    </div>

    <div id="csGrid" class="shared-grid"></div>

    <div id="csEmpty" class="admin-loading" style="display:none" data-i18n="contentSearchNoResults">{{ _('contentSearchNoResults') }}</div>
  </main>
</div>
<script type="module" src="/static/content/content-search.js?v=2"></script>
{% endblock %}
