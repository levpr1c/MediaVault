{% from 'shared/macros.html' import password_field with context %}
<!DOCTYPE html>
<html lang="{{ lang }}" data-theme="{{ theme }}" data-three-bg="{{ '1' if s.get('three_bg', True) else '0' }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ _('secLoginTitle') }} — MediaVault</title>
<link rel="icon" type="image/svg+xml" href="/favicon.ico">
<link rel="preload" as="font" type="font/woff2" href="/static/fonts/Unbounded-latin.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="/static/fonts/Unbounded-cyrillic.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="/static/fonts/Unbounded-cyrillic-ext.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="/static/fonts/ibmplexsans-latin.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="/static/fonts/ibmplexsans-cyrillic.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="/static/fonts/ibmplexsans-cyrillic-ext.woff2" crossorigin>
<link rel="stylesheet" href="/static/css/shared.css?v=10">
<script type="importmap">
{
  "imports": {
    "three": "/static/lib/three.module.js"
  }
}
</script>
<style>
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); }
  #loginBgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;display:block}
  #app { display: flex; align-items: center; justify-content: center; min-height: 100vh; position:relative; z-index:1; }
  .login-card {
    background: rgba(25,25,40,0.8); border: 1px solid rgba(255,255,255,0.07);
    -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
    border-radius: 16px; padding: 40px 36px; width: 340px; max-width: 90vw;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
  }
  [data-theme="light"] .login-card {
    background: rgba(255,255,255,0.75);
    border-color: rgba(0,0,0,0.08);
  }
  .login-card h1 { margin: 0 0 8px; font-size: 22px; text-align: center; }
  .login-card p { margin: 0 0 24px; text-align: center; color: var(--text2); font-size: 14px; }
  .pw-wrap {
    position: relative; display: flex; align-items: center;
    margin-bottom: 8px;
  }
  .pw-wrap input {
    width: 100%; padding: 10px 38px 10px 14px; border: 1px solid var(--border);
    border-radius: 10px; background: var(--bg); color: var(--text);
    font-size: 16px; box-sizing: border-box; outline: none;
  }
  .pw-wrap input:focus { border-color: var(--accent); }
  .pw-toggle {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 6px;
    color: var(--text2); line-height: 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; transition: all .15s;
  }
  .pw-toggle:hover { color: var(--text); background: var(--surface); }
  .pw-toggle svg { width: 20px; height: 20px; display: block; }
  .login-card .btn {
    width: 100%; margin-top: 12px; padding: 10px; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .login-error { color: #ef4444; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
  .login-toolbar { position: fixed; top: 16px; right: 16px; display: flex; gap: 6px; z-index: 10; }
  .login-toolbar button {
    display: inline-flex; align-items: center; justify-content: center; gap: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 6px; cursor: pointer; color: var(--text2); min-width: 34px; height: 34px;
    transition: all .2s ease; overflow: hidden;
  }
  .login-toolbar button:hover { background: var(--surface2); color: var(--text); }
  .login-toolbar button:active { transform: scale(.93); }
.login-toolbar button svg { display: block; flex-shrink: 0; }
.lang-btn .lang-text{font-size:13px;font-weight:700;white-space:nowrap;width:0;overflow:hidden;display:block;color:var(--accent);transition:width .35s cubic-bezier(.34,1.56,.64,1)}
.lang-btn.show-text .lang-text{width:28px;padding-right:4px}
.lang-btn.show-text{gap:6px}
</style>
</head>
<body>
<div id="loginBgCanvas"></div>
<div id="app">
  <div class="login-toolbar">
    <button class="theme-btn" id="themeToggle" onclick="Shared.toggleTheme(this)" title="{{ _('themeToggle') }}">
      <svg class="theme-icon theme-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"{% if theme == 'dark' %} style="display:none"{% endif %}><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <svg class="theme-icon theme-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"{% if theme != 'dark' %} style="display:none"{% endif %}><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
    <button class="lang-btn" id="langToggle" onclick="Shared.toggleLang(this)" title="{{ _('langToggle') }}">
      <span class="lang-text">{{ 'EN' if lang == 'en' else 'RU' }}</span>
      <svg class="lang-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    </button>
  </div>
  <div class="login-card">
    <h1 data-i18n="secLoginTitle">{{ _('secLoginTitle') }}</h1>
    <p data-i18n="secLoginDesc">{{ _('secLoginDesc') }}</p>
    <form id="loginForm" onsubmit="event.preventDefault();doLogin()">
      <input type="text" id="username" data-i18n-placeholder="secUsername" placeholder="{{ _('secUsername') }}"
             style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:16px;box-sizing:border-box;outline:none;margin-bottom:8px">
      {{ password_field(name='password', id='password', placeholder=_('secPassword'), cls='pw-wrap', toggle_class='pw-toggle') }}
      <button class="btn btn-primary" type="submit" data-i18n="secSignIn">{{ _('secSignIn') }}</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </div>
</div>
<script src="/static/shared/utils.js"></script>
<script>
Shared.initLangBtn();
var _i18nData = {{ LOCALE_JSON|safe }};
function togglePw(btn) {
  var input = btn.parentElement.querySelector('input');
  if (!input) return;
  if (input.type === 'password') {
    input.type = 'text';
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  } else {
    input.type = 'password';
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  }
}
function doLogin() {
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  var err = document.getElementById('loginError');
  if (!username) { err.textContent = 'Enter username'; err.style.display = 'block'; return; }
  fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:username, password:password})})
    .then(function(r) {
      if (r.ok) { window.location.href = '/'; }
      else { r.json().then(function(d) { err.textContent = d.error === 'wrong_credentials' ? 'Invalid username or password' : d.error || 'Error'; err.style.display = 'block'; }); }
    })
    .catch(function() { err.textContent = 'Connection error'; err.style.display = 'block'; });
}
</script>
<script type="module">
import { initHomeBg } from '/static/shared/home-bg.js';
import * as THREE from 'three';

var btn = document.querySelector('.login-card .btn');
var hoverBtn = false;
var accColor = new THREE.Color(0.95, 0.95, 0.95);
var accentCol = new THREE.Color(getComputedStyle(document.documentElement).getPropertyValue('--accent').trim());
var restCol = new THREE.Color(0.95, 0.95, 0.95);
var hoverTarget = 0;
var darkValue = document.documentElement.getAttribute('data-theme') !== 'light' ? 1 : 0;

function updateColors() {
  accentCol.set(getComputedStyle(document.documentElement).getPropertyValue('--accent').trim());
  darkValue = document.documentElement.getAttribute('data-theme') !== 'light' ? 1 : 0;
  var r = darkValue ? 0.95 : 0.08;
  restCol.setRGB(r, r, r);
}
updateColors();

if (btn) {
  btn.addEventListener('mouseenter', function(){ hoverBtn = true; });
  btn.addEventListener('mouseleave', function(){ hoverBtn = false; });
}

var themeObs = new MutationObserver(updateColors);
themeObs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

initHomeBg({
  containerId: 'loginBgCanvas',
  beforeRender: function(u) {
    var target = hoverBtn ? 1 : 0;
    hoverTarget += (target - hoverTarget) * 0.06;

    if (hoverBtn) {
      accColor.lerp(accentCol, 0.08);
    } else {
      accColor.lerp(restCol, 0.04);
    }

    u.u_hover.value = hoverTarget;
    u.u_accent.value.copy(accColor);
  }
});
</script>
</body>
</html>
