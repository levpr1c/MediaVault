{% extends "base.html" %}
{% from 'shared/macros.html' import theme_buttons with context %}
{% block header %}{% endblock %}
{% block content %}
<div id="popularTagsView" class="view{% if page == 'popular_tags' %} active{% endif %}">
  <div class="pv-header">
    <h1 class="pv-title" data-i18n="mvPopularTags">{{ _('mvPopularTags') }}</h1>
    <div class="pv-spacer"></div>
    {{ theme_buttons(cls='pv-mob-btn') }}
    <a href="/" class="pv-mob-btn" title="Home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>

  </div>
  <div class="pv-body">
    <div id="popularTagsFullList" class="pv-tags"></div>
  </div>
</div>

<style>
.pv-header{display:flex;align-items:center;gap:12px;padding:6px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.pv-title{font-size:16px;font-weight:700;margin:0;white-space:nowrap;font-family:var(--font-heading)}
.pv-spacer{flex:1}
.pv-body{padding:16px;max-width:1000px;margin:0 auto;overflow-y:auto;flex:1}
.pv-tags{display:flex;flex-wrap:wrap;gap:6px}
.pv-mob-btn{width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;border:1px solid transparent;border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;line-height:1}
.pv-mob-btn:hover{background:var(--surface2);color:var(--text)}
.pv-mob-btn:active{background:var(--accent);color:#fff;border-color:var(--accent)}
@media(max-width:768px){.pv-title{font-size:14px}}
</style>
{% endblock %}
